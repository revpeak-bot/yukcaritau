<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuk Cari Tau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="progress-bar" id="progressBar"></div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Yuk Cari Tau</span>
      </a>
      <nav class="main-nav" aria-label="Navigasi Utama">
        <ul>
          <li><a href="/">Beranda</a></li>
          <li><a href="#">Teknologi</a></li>
          <li><a href="#">Gaya Hidup</a></li>
          <li><a href="#">Kesehatan</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Ganti tema">🌙</button>
        <button class="menu-toggle" aria-label="Buka menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="container article-layout">
    <article class="article-content" id="articleContainer">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/">Beranda</a>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5L7.5 6L4.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="breadcrumbCat">Kategori</span>
      </nav>

      <h1 id="articleTitle">Memuat...</h1>
      <div class="article-meta">
        <span class="meta-date" id="articleDate">-</span>
        <span class="meta-dot">•</span>
        <span class="meta-read" id="readTime">-</span>
      </div>

      <img id="coverImg" src="" alt="" class="featured-img" loading="eager">
      <div class="article-body" id="articleBody"></div>

      <div class="share-bar">
        <span class="share-label">Bagikan:</span>
        <button class="share-btn share-wa" onclick="share('wa')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </button>
        <button class="share-btn share-fb" onclick="share('fb')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
        <button class="share-btn share-tw" onclick="share('tw')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Twitter
        </button>
      </div>
    </article>

    <aside class="sidebar">
      <div class="sidebar-widget">
        <h3>Artikel Terkait</h3>
        <ul id="relatedList">
          <li class="skeleton-line"></li>
          <li class="skeleton-line" style="margin-top:.5rem"></li>
          <li class="skeleton-line" style="margin-top:.5rem"></li>
        </ul>
      </div>
      <div class="ad-slot ad-sidebar sticky" aria-label="Iklan">
        <span class="ad-label">Iklan</span>
      </div>
    </aside>
  </main>

  <div class="ad-slot ad-mobile-bottom" aria-label="Iklan">
    <span class="ad-label">Iklan</span>
    <button class="close-ad" aria-label="Tutup iklan">×</button>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Yuk Cari Tau</span>
      </div>
      <p class="footer-copy">&copy; 2026 Yuk Cari Tau. Hak cipta dilindungi.</p>
      <nav aria-label="Footer">
        <a href="#">Kebijakan Privasi</a>
        <a href="#">Kontak</a>
      </nav>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
