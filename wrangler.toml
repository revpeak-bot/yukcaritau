# ╔══════════════════════════════════════════════════════════╗
# ║         Yuk Cari Tau — wrangler.toml                    ║
# ╚══════════════════════════════════════════════════════════╝
#
# Deploy: npx wrangler deploy
# Dev:    npx wrangler dev

name = "yuk-cari-tau"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Routes ─────────────────────────────────────────────────
# Semua request ke yukcaritau.my.id diarahkan ke worker ini
routes = [
  { pattern = "yukcaritau.my.id/*", zone_name = "yukcaritau.my.id" }
]

# ── Environment Variables ───────────────────────────────────
# JANGAN isi di sini! Set via:
#   npx wrangler secret put SUPABASE_URL
#   npx wrangler secret put SUPABASE_KEY
#   npx wrangler secret put ANTHROPIC_KEY
#   npx wrangler secret put UNSPLASH_KEY
#   npx wrangler secret put AGENT_SECRET
#
# Atau via Cloudflare Dashboard:
#   Workers & Pages → yuk-cari-tau → Settings → Variables and Secrets

[vars]
PAGES_URL = "https://yukcaritau.pages.dev"

# ── Observability (opsional, untuk melihat log) ─────────────
[observability]
enabled = true

# ── Cron Triggers ──────────────────────────────────────────
# Otomatis generate artikel setiap hari jam 06:00 WIB (23:00 UTC)
# Uncomment baris di bawah setelah endpoint /api/generate-articles siap:
#
# [triggers]
# crons = ["0 23 * * *"]
#
# Lalu tambahkan handler di worker.js:
# export default {
#   async scheduled(event, env, ctx) {
#     ctx.waitUntil(handleGenerateArticles({ headers: new Headers({'X-Agent-Secret': env.AGENT_SECRET}) }, env, ctx));
#   },
#   async fetch(request, env, ctx) { ... }
# }
